<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ernest Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <h1>Ernest's Dashboard</h1>

      <div class="header-buttons">
        <button class="toggle-btn" onclick="toggleDarkMode()">🌙</button>
        <button onclick="openModal()">+ Add Subject</button>
      </div>
    </header>

    <!-- Chart Section -->
    <div class="chart-section">
      <div class="chart-header">
        <h3>Performance Overview</h3>
        <button onclick="toggleChartType()">Switch Chart</button>
      </div>
      <canvas id="gradesChart"></canvas>
    </div>

    <!-- Average Section -->
    <div class="average-section">
      <div class="average-label">Average</div>
      <div class="average-bar">
        <div class="average-fill" id="averageFill"></div>
      </div>
      <div class="average-value" id="averageValue">0%</div>
    </div>

    <!-- Subjects -->
    <div id="subjectsContainer"></div>
  </div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <h2 id="modalTitle">Add Subject</h2>
      <input type="text" id="subjectName" placeholder="Subject name">
      <input type="number" id="subjectScore" placeholder="Score">
      <div class="modal-buttons">
        <button onclick="closeModal()">Cancel</button>
        <button onclick="saveSubject()">Save</button>
      </div>
    </div>
  </div>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Script -->
  <script src="script.js?v=100"></script>

</body>
</html>
