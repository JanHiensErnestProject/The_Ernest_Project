<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ernest's Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  padding: 40px;
}

h1 {
  margin-bottom: 30px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 30px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
  margin-bottom: 30px;
}

#chartWrapper {
  width: 500px;
  height: 500px;
  margin: auto;
  position: relative;
}

canvas {
  width: 100% !important;
  height: 100% !important;
}
</style>
</head>

<body>

<h1>Ernest's Dashboard</h1>

<div class="card">
  <h2>Performance Overview</h2>
  <div id="chartWrapper">
    <canvas id="gradesChart"></canvas>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const subjects = [
    { name: "Mathematics", score: 85 },
    { name: "English", score: 78 },
    { name: "Science", score: 90 },
    { name: "Math", score: 70 },
    { name: "Biology", score: 86 },
    { name: "History", score: 88 }
  ];

  const ctx = document.getElementById("gradesChart").getContext("2d");

  new Chart(ctx, {
    type: "doughnut",
    data: {
      labels: subjects.map(s => s.name),
      datasets: [{
        data: subjects.map(s => s.score),
        borderWidth: 3,
        borderColor: "#ffffff",
        backgroundColor: [
          "#003caa",
          "#006b2e",
          "#b34700",
          "#5600aa",
          "#99001f",
          "#006a8f"
        ]
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: "60%",
      plugins: {
        legend: {
          position: "top"
        }
      }
    }
  });

});
</script>

</body>
</html>
