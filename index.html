<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ernest Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  background: #ffffff;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#chartWrapper {
  position: relative;
  width: 500px;
  height: 500px;
}

/* Tubular depth */
#chartWrapper::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  pointer-events: none;
  background: radial-gradient(
    circle,
    rgba(0,0,0,0.45) 0%,
    rgba(255,255,255,0.55) 45%,
    rgba(0,0,0,0.45) 90%
  );
  mix-blend-mode: overlay;
}

/* Gloss highlight */
#chartWrapper::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  pointer-events: none;
  background: radial-gradient(
    circle at 30% 20%,
    rgba(255,255,255,0.8),
    transparent 70%
  );
}

canvas {
  position: relative;
  z-index: 2;
}
</style>
</head>

<body>

<div id="chartWrapper">
  <canvas id="gradesChart"></canvas>
</div>

<script src="script.js"></script>

</body>
</html>
