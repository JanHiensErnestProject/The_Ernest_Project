<script>
document.addEventListener("DOMContentLoaded", function () {

  const subjects = [
    { name: "Mathematics", score: 85 },
    { name: "English", score: 78 },
    { name: "Science", score: 90 },
    { name: "Math", score: 70 },
    { name: "Biology", score: 86 },
    { name: "History", score: 88 }
  ];

  const ctx = document.getElementById("gradesChart").getContext("2d");

  new Chart(ctx, {
    type: "doughnut",
    data: {
      labels: subjects.map(s => s.name),
      datasets: [{
        data: subjects.map(s => s.score),
        borderWidth: 3,
        borderColor: "#ffffff",
        backgroundColor: function(context) {

          const chart = context.chart;
          const {ctx, chartArea} = chart;

          if (!chartArea) return "#ccc";

          const index = context.dataIndex;

          const darkColors = [
            "#002b7a",
            "#004d21",
            "#8a3300",
            "#3a0066",
            "#6e0015",
            "#004c66"
          ];

          const lightColors = [
            "#4da3ff",
            "#4dff88",
            "#ff9d4d",
            "#a366ff",
            "#ff4d6d",
            "#4dd2ff"
          ];

          const centerX = (chartArea.left + chartArea.right) / 2;
          const centerY = (chartArea.top + chartArea.bottom) / 2;
          const radius = (chartArea.right - chartArea.left) / 2;

          const gradient = ctx.createRadialGradient(
            centerX,
            centerY,
            radius * 0.4,
            centerX,
            centerY,
            radius
          );

          gradient.addColorStop(0, darkColors[index]);
          gradient.addColorStop(1, lightColors[index]);

          return gradient;
        }
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: "60%",
      plugins: {
        legend: {
          position: "top"
        }
      }
    }
  });

});
</script>
